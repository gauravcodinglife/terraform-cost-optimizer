name: Cost Janitor

# ── When does this workflow run? ──────────────────────────────────────────────
on:
  pull_request:           # On every PR opened or updated
    branches: ["main"]
  push:
    branches: ["main"]    # Also runs on direct pushes to main
  workflow_dispatch:      # Allows manual trigger from GitHub UI

# ── Permissions needed to post PR comments ────────────────────────────────────
permissions:
  contents: read
  pull-requests: write    # Required for the "post PR comment" step

jobs:
  cost-janitor:
    name: Scan for Orphaned Resources
    runs-on: ubuntu-latest  # Fresh Ubuntu VM every time

    # ── LocalStack runs as a "service container" ─────────────────────────────
    # This is like running `docker run localstack` in the background
    # It starts BEFORE your steps run, so Terraform can connect to it
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566       # LocalStack's main port
        env:
          SERVICES: ec2,s3,sts   # Only start the AWS services we need (faster)
          DEFAULT_REGION: us-east-1
        # Wait until LocalStack is healthy before continuing
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      # ── Step 1: Check out your repo code ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: Install Python dependencies ──────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r janitor/requirements.txt

      # ── Step 4: Install Terraform ─────────────────────────────────────────
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # ── Step 5: Install tflocal (Terraform → LocalStack wrapper) ──────────
      - name: Install tflocal
        run: pip install terraform-local

      # ── Step 6: Verify LocalStack is reachable ────────────────────────────
      # This gives us confidence before we try to apply Terraform
      - name: Wait for LocalStack to be ready
        run: |
          echo "Checking LocalStack health..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:4566/_localstack/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          services = data.get('services', {})
          ready = all(v in ['running', 'available'] for v in services.values())
          print('ready' if ready else 'not_ready')
          " 2>/dev/null || echo "not_ready")
            if [ "$STATUS" = "ready" ]; then
              echo "✅ LocalStack is ready!"
              break
            fi
            echo "  Waiting... attempt $i/20"
            sleep 5
          done

      # ── Step 7: Terraform fmt check ───────────────────────────────────────
      # Fails if code isn't properly formatted — enforces code style
      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      # ── Step 8: Terraform init ────────────────────────────────────────────
      - name: Terraform init
        working-directory: terraform
        env:
          # Tell tflocal where LocalStack is running
          LOCALSTACK_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal init

      # ── Step 9: Terraform validate ────────────────────────────────────────
      # Checks syntax and internal consistency without connecting to AWS
      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      # ── Step 10: Terraform apply ──────────────────────────────────────────
      # Creates all the resources (VPC, EC2, S3, orphan EBS) in LocalStack
      - name: Terraform apply
        working-directory: terraform
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal apply -auto-approve

      # ── Step 11: Run the Cost Janitor ─────────────────────────────────────
      # --dry-run means it only reports, never deletes
      # We capture the exit code separately so the workflow doesn't
      # stop here — we still want to upload the report even if orphans found
      - name: Run Cost Janitor (dry-run)
        id: janitor
        working-directory: janitor
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Run janitor and capture exit code without failing the step
          python janitor.py \
            --dry-run \
            --endpoint-url http://localhost:4566 \
            --output-json report.json \
            --output-md report.md || JANITOR_EXIT=$?

          # Save exit code for later steps to read
          echo "exit_code=${JANITOR_EXIT:-0}" >> $GITHUB_OUTPUT

          # Save orphan count for the PR comment step
          ORPHAN_COUNT=$(python3 -c "
          import json
          with open('report.json') as f:
              data = json.load(f)
          print(data['summary']['total_orphans'])
          ")
          echo "orphan_count=$ORPHAN_COUNT" >> $GITHUB_OUTPUT

          WASTE=$(python3 -c "
          import json
          with open('report.json') as f:
              data = json.load(f)
          print(data['summary']['estimated_monthly_waste_usd'])
          ")
          echo "monthly_waste=$WASTE" >> $GITHUB_OUTPUT

          # Print report to the workflow log so it's visible inline
          echo "──────── Janitor Report Summary ────────"
          cat report.md
          echo "─────────────────────────────────────────"

      # ── Step 12: Upload report.json as a downloadable artifact ───────────
      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()    # Upload even if janitor found orphans
        with:
          name: cost-janitor-report-json
          path: janitor/report.json
          retention-days: 30

      # ── Step 13: Upload report.md as a downloadable artifact ─────────────
      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-report-markdown
          path: janitor/report.md
          retention-days: 30

      # ── Step 14: Post PR comment if orphans found ─────────────────────────
      # This only runs on pull_request events (not push to main)
      # The comment will appear directly on the PR for reviewers to see
      - name: Post PR comment with findings
        if: |
          github.event_name == 'pull_request' &&
          steps.janitor.outputs.orphan_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportMd = fs.readFileSync('janitor/report.md', 'utf8');
            const orphanCount = '${{ steps.janitor.outputs.orphan_count }}';
            const waste = '${{ steps.janitor.outputs.monthly_waste }}';

            const body = [
              '## ⚠️ Cost Janitor Found Orphaned Resources',
              '',
              `**Orphans detected:** ${orphanCount}`,
              `**Estimated monthly waste:** $${waste}`,
              '',
              '---',
              '',
              reportMd,
              '',
              '---',
              '_This comment was posted automatically by the Cost Janitor workflow._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
          });

      # ── Step 15: Fail the workflow if orphans were found ──────────────────
      # This is the gate — PRs with orphaned resources are blocked
      - name: Fail if orphans found
        if: steps.janitor.outputs.exit_code != '0'
        run: |
          echo "❌ Cost Janitor found orphaned resources."
          echo "   Review the report artifacts above and fix before merging."
          exit 1
