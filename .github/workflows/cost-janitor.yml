name: Cost Janitor

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-janitor:
    name: Scan for Orphaned Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r janitor/requirements.txt
          pip install terraform-local

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Start LocalStack 3.8.1
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e SERVICES=ec2,s3,sts \
            -e DEFAULT_REGION=us-east-1 \
            localstack/localstack:3.8.1
          echo "Waiting for LocalStack..."
          for i in {1..40}; do
            HEALTH=$(curl -s http://localhost:4566/_localstack/health 2>/dev/null || echo "{}")
            echo "Attempt $i: $HEALTH"
            if echo "$HEALTH" | grep -qE "running|available"; then
              echo "LocalStack ready!"
              break
            fi
            sleep 5
          done
          curl -s http://localhost:4566/_localstack/health

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal apply -auto-approve -input=false

      - name: Run Cost Janitor
        id: janitor
        working-directory: janitor
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          JANITOR_EXIT=0
          python janitor.py \
            --dry-run \
            --endpoint-url http://localhost:4566 \
            --output-json report.json \
            --output-md report.md || JANITOR_EXIT=$?
          echo "exit_code=$JANITOR_EXIT" >> $GITHUB_OUTPUT
          ORPHAN_COUNT=$(python3 -c "
          import json
          with open('report.json') as f:
              data = json.load(f)
          print(data['summary']['total_orphans'])
          " 2>/dev/null || echo "0")
          echo "orphan_count=$ORPHAN_COUNT" >> $GITHUB_OUTPUT
          WASTE=$(python3 -c "
          import json
          with open('report.json') as f:
              data = json.load(f)
          print(data['summary']['estimated_monthly_waste_usd'])
          " 2>/dev/null || echo "0")
          echo "monthly_waste=$WASTE" >> $GITHUB_OUTPUT
          cat report.md || echo "No report"

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-report-json
          path: janitor/report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-report-markdown
          path: janitor/report.md
          if-no-files-found: warn
          retention-days: 30

      - name: Post PR comment
        if: |
          github.event_name == 'pull_request' &&
          steps.janitor.outputs.orphan_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportMd = '';
            try { reportMd = fs.readFileSync('janitor/report.md', 'utf8'); } catch(e) {}
            const orphanCount = '${{ steps.janitor.outputs.orphan_count }}';
            const waste = '${{ steps.janitor.outputs.monthly_waste }}';
            const body = [
              '## Cost Janitor Found Orphaned Resources',
              `**Orphans:** ${orphanCount}`,
              `**Est. monthly waste:** $${waste}`,
              '---',
              reportMd,
              '_Posted by Cost Janitor workflow._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if orphans found
        if: steps.janitor.outputs.exit_code != '0'
        run: exit 1
